<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Tiro ao Alvo Patriota</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Tiro ao Alvo Patriota</h1>

    <div id="game-container">
        <div id="ui-container">
            <div id="score">Pontos: 0</div>
            <button id="fullscreen-button" title="Tela Cheia (F)">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="white">
                    <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
                </svg>
            </button>
            <button id="mute-button" title="Silenciar som">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="white" aria-hidden="true">
                    <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.32-2.5-4.09v8.17c1.48-.77 2.5-2.32 2.5-4.08zm2.5 0c0 2.94-1.68 5.53-4.17 6.82l-.87-1.5C16.93 16.46 18 14.84 18 12s-1.07-4.46-3.04-5.32l.87-1.5C17.32 6.47 19 9.06 19 12zm2.5 0c0 4.11-2.34 7.69-5.79 9.42l-.88-1.52C18.48 18.53 21 15.52 21 12s-2.52-6.53-5.17-7.9l.88-1.52C19.16 4.31 21.5 7.89 21.5 12z"/>
                </svg>
            </button>
            <div id="lives-container"></div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="milestone-modal">
            <img src="https://i.pinimg.com/736x/bb/0e/1e/bb0e1ea972249775da0a9c1e766b63e6.jpg" alt="Foto do Bolsonaro" onerror="this.onerror=null;this.src='https://placehold.co/150x150/000000/FFFFFF?text=Erro!+Imagem+n%C3%A3o+carregou';">
            <p>Muito bem, imbroxável!</p>
        </div>
        <div id="pause-modal"><p>PAUSADO</p></div>
        <div id="flash-message"></div>
        <div id="modal" style="display: flex;">
             <div id="modal-content">
                <div id="modal-title">Escolha a Dificuldade</div>
                <div class="difficulty-buttons">
                    <button id="facilButton">Fácil</button>
                    <button id="medioButton">Médio</button>
                    <button id="dificilButton">Difícil</button>
                </div>
                <p style="font-size: 12px; margin-top: 20px; color: #f1c40f;">Pressione 'ESC' para pausar o jogo.</p>
            </div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
