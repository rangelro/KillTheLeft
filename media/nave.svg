<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="400" height="400">
    <g fill="#FF5722">
        <polygon points="35,80 45,80 40,95">
            <animate attributeName="points" values="35,80 45,80 40,95; 35,80 45,80 40,105; 35,80 45,80 40,95" dur="0.15s" repeatCount="indefinite" />
        </polygon>
        <polygon points="55,80 65,80 60,95">
            <animate attributeName="points" values="55,80 65,80 60,95; 55,80 65,80 60,105; 55,80 65,80 60,95" dur="0.1s" repeatCount="indefinite" />
        </polygon>
    </g>

    <rect x="16" y="15" width="8" height="6" fill="#FF0000" rx="2" />
    <rect x="76" y="15" width="8" height="6" fill="#FF0000" rx="2" />

    <g fill="#F8C100" stroke="#009C3B" stroke-width="2" stroke-linejoin="round">
        
        <rect x="15" y="20" width="10" height="30" rx="2" />
        <rect x="15" y="50" width="15" height="15" rx="2" />
        <rect x="5" y="50" width="10" height="10" rx="2" />

        <rect x="75" y="20" width="10" height="30" rx="2" />
        <rect x="70" y="50" width="15" height="15" rx="2" />
        <rect x="85" y="50" width="10" height="10" rx="2" />
        
    </g>

    <rect x="30" y="25" width="40" height="55" rx="8" fill="#002776" stroke="#F8C100" stroke-width="2" />

    <clipPath id="corpoNave">
        <rect x="30" y="25" width="40" height="55" rx="8" />
    </clipPath>
    
    <g clip-path="url(#corpoNave)">
        <polygon points="25,40 75,65 75,80 25,55" fill="#009C3B" />
        <polygon points="25,45 75,70 75,75 25,50" fill="#F8C100" />
    </g>

    <circle cx="50" cy="38" r="14" fill="#FAD6B1" stroke="#000" stroke-width="1.5" />
    
    <path d="M 36,38 C 36,20 64,20 64,38 C 64,28 50,22 36,38 Z" fill="#4A4A4A" />
    <path d="M 40,28 C 46,24 54,24 58,28 C 54,26 46,26 40,28 Z" fill="#D3D3D3" opacity="0.4" />
    
    <path d="M 40,42 Q 45,46 50,42 Q 55,46 60,42 L 58,45 Q 50,48 42,45 Z" fill="#1A1A1A" />

    <circle cx="30" cy="57" r="3" fill="#333" />
    <circle cx="70" cy="57" r="3" fill="#333" />
</svg>
